version: '3.8'

services:
  ransomfree-app:
    build: .
    container_name: ransomfree-app
    ports:
      - "5001:5001"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount the Docker socket so the Python app can spin up sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the outputs directory so it persists
      - ./backend/outputs:/app/backend/outputs
    restart: unless-stopped
